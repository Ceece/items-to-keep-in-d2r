  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #0f3460;
    --text: #e0e0e0;
    --accent: #e94560;
    --gold: #d4a745;
    --muted: #8899aa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    background: linear-gradient(180deg, #0f3460 0%, var(--bg) 100%);
  }
  .header h1 {
    font-family: 'ExocetOTCECY-Medium', Georgia, serif;
    color: var(--gold);
    font-size: 2.2rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }
  .header p {
    color: var(--muted);
    font-size: 0.9rem;
  }
  .header a { color: var(--accent); text-decoration: none; }
  .header a:hover { text-decoration: underline; }
  .controls {
    max-width: 900px;
    margin: 1.5rem auto 1rem;
    padding: 0 1rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
  }
  #search {
    flex: 1;
    min-width: 200px;
    padding: 0.6rem 1rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-size: 1rem;
    outline: none;
  }
  #search:focus { border-color: var(--gold); }
  #search::placeholder { color: var(--muted); }
  #tierFilter {
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.9rem;
    cursor: pointer;
    outline: none;
  }
  .count {
    color: var(--muted);
    font-size: 0.85rem;
    margin-left: auto;
  }
  .table-wrap {
    max-width: 900px;
    margin: 0 auto 2rem;
    padding: 0 1rem;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  thead th {
    background: var(--border);
    color: var(--gold);
    padding: 0.6rem 0.75rem;
    text-align: left;
    position: sticky;
    top: 0;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: #fff; }
  thead th::after { content: ' ⇅'; font-size: 0.7rem; color: var(--muted); }
  tbody tr { border-bottom: 1px solid #1e2a4a; }
  tbody tr:hover { background: rgba(233,69,96,0.07); }
  td { padding: 0.5rem 0.75rem; vertical-align: top; }
  td:nth-child(1) { font-family: 'ExocetOTCECY-Medium', Georgia, serif; color: #fff; font-weight: 600; font-size: 0.95rem; text-transform: uppercase; }
  .tier {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .tier-hdhv { background: #b8860b33; color: #ffd700; }
  .tier-hdmv { background: #4682b433; color: #87ceeb; }
  .tier-ldlv { background: #2e8b5733; color: #66cdaa; }
  .tier-ndnv { background: #8b000033; color: #cd5c5c; }
  .notes { color: var(--muted); font-size: 0.82rem; }
  mark { background: var(--accent); color: #fff; border-radius: 2px; padding: 0 2px; }
  .footer {
    text-align: center;
    padding: 1.5rem;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }
  .footer a { color: var(--accent); text-decoration: none; }
  @media (max-width: 700px) {
    .header h1 { font-size: 1.6rem; }
    .controls { flex-direction: column; }
    #search, #tierFilter { width: 100%; font-size: 16px; }
    .count { margin-left: 0; }
    table, thead, tbody, tr, th, td { display: block; }
    thead { display: none; }
    tbody tr {
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    td { padding: 0.2rem 0; border: none; }
    td:nth-child(1) { font-size: 1rem; margin-bottom: 0.25rem; }
    td:nth-child(2)::before { content: "Category: "; color: var(--muted); font-size: 0.75rem; }
    td:nth-child(2) { font-size: 0.82rem; margin-bottom: 0.25rem; }
    td:nth-child(3) { margin-bottom: 0.25rem; }
    td:nth-child(4) { font-size: 0.82rem; }
    .table-wrap { padding: 0 0.5rem; }
  }
</style>

const TIER_LABELS={
  hdhv:"High Demand / High Value",
  hdmv:"High Demand / Mid Value",
  ldlv:"Low Demand / Low Value",
  ndnv:"No Demand / No Value",
};
const TIER_CLASS={hdhv:"tier-hdhv",hdmv:"tier-hdmv",ldlv:"tier-ldlv",ndnv:"tier-ndnv"};

const tbody=document.getElementById("tbody");
const searchEl=document.getElementById("search");
const tierEl=document.getElementById("tierFilter");
const countEl=document.getElementById("count");

let sortCol=0, sortAsc=true;

function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function highlight(text, q){
  if(!q) return escHtml(text);
  const esc=escHtml(text);
  const re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
  return esc.replace(re,"<mark>$1</mark>");
}

function render(){
  const q=searchEl.value.trim().toLowerCase();
  const tier=tierEl.value;
  let filtered=DATA.filter(r=>{
    if(tier && r[2]!==tier) return false;
    if(q){
      const hay=(r[0]+" "+r[1]+" "+TIER_LABELS[r[2]]+" "+r[3]).toLowerCase();
      return hay.includes(q);
    }
    return true;
  });
  filtered.sort((a,b)=>{
    let va=a[sortCol], vb=b[sortCol];
    if(sortCol===2){va=TIER_LABELS[va];vb=TIER_LABELS[vb];}
    const cmp=va.localeCompare(vb);
    return sortAsc?cmp:-cmp;
  });
  const rows=filtered.map(r=>{
    const tierLabel=TIER_LABELS[r[2]];
    const tierCls=TIER_CLASS[r[2]];
    return `<tr>
      <td>${highlight(r[0],searchEl.value.trim())}</td>
      <td>${highlight(r[1],searchEl.value.trim())}</td>
      <td><span class="tier ${tierCls}">${escHtml(tierLabel)}</span></td>
      <td class="notes">${highlight(r[3],searchEl.value.trim())}</td>
    </tr>`;
  }).join("");
  tbody.innerHTML=rows;
  countEl.textContent=filtered.length+" / "+DATA.length+" items";
}

searchEl.addEventListener("input",render);
tierEl.addEventListener("change",render);

document.querySelectorAll("thead th").forEach(th=>{
  th.addEventListener("click",()=>{
    const col=+th.dataset.col;
    if(sortCol===col) sortAsc=!sortAsc;
    else { sortCol=col; sortAsc=true; }
    render();
  });
});

render();
</script>
