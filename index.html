<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="D2R Items">
<meta name="theme-color" content="#1a1a2e">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<title>Items to Keep in D2R</title>
<style>
  @font-face {
    font-family: "ExocetOTCECY-Medium";
    src: url("https://db.onlinewebfonts.com/t/1241ae66485548a9fed1d3c923f27761.eot");
    src: url("https://db.onlinewebfonts.com/t/1241ae66485548a9fed1d3c923f27761.eot?#iefix")format("embedded-opentype"),
    url("https://db.onlinewebfonts.com/t/1241ae66485548a9fed1d3c923f27761.woff2")format("woff2"),
    url("https://db.onlinewebfonts.com/t/1241ae66485548a9fed1d3c923f27761.woff")format("woff"),
    url("https://db.onlinewebfonts.com/t/1241ae66485548a9fed1d3c923f27761.ttf")format("truetype"),
    url("https://db.onlinewebfonts.com/t/1241ae66485548a9fed1d3c923f27761.svg#ExocetOTCECY-Medium")format("svg");
}
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #0f3460;
    --text: #e0e0e0;
    --accent: #e94560;
    --gold: #d4a745;
    --muted: #8899aa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    background: linear-gradient(180deg, #0f3460 0%, var(--bg) 100%);
  }
  .header h1 {
    font-family: 'ExocetOTCECY-Medium', Georgia, serif;
    color: var(--gold);
    font-size: 2.2rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }
  .header p {
    color: var(--muted);
    font-size: 0.9rem;
  }
  .header a { color: var(--accent); text-decoration: none; }
  .header a:hover { text-decoration: underline; }
  .controls {
    max-width: 900px;
    margin: 1.5rem auto 1rem;
    padding: 0 1rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
  }
  #search {
    flex: 1;
    min-width: 200px;
    padding: 0.6rem 1rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-size: 1rem;
    outline: none;
  }
  #search:focus { border-color: var(--gold); }
  #search::placeholder { color: var(--muted); }
  #tierFilter {
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.9rem;
    cursor: pointer;
    outline: none;
  }
  .count {
    color: var(--muted);
    font-size: 0.85rem;
    margin-left: auto;
  }
  .table-wrap {
    max-width: 900px;
    margin: 0 auto 2rem;
    padding: 0 1rem;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  thead th {
    background: var(--border);
    color: var(--gold);
    padding: 0.6rem 0.75rem;
    text-align: left;
    position: sticky;
    top: 0;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: #fff; }
  thead th::after { content: ' ⇅'; font-size: 0.7rem; color: var(--muted); }
  tbody tr { border-bottom: 1px solid #1e2a4a; }
  tbody tr:hover { background: rgba(233,69,96,0.07); }
  td { padding: 0.5rem 0.75rem; vertical-align: top; }
  td:nth-child(1) { font-family: 'ExocetOTCECY-Medium', Georgia, serif; color: #fff; font-weight: 600; font-size: 0.95rem; text-transform: uppercase; white-space: nowrap; }
  td:nth-child(2) { white-space: nowrap; }
  .tier {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .tier-High { background: #b8860b33; color: #ffd700; }
  .tier-Med { background: #4682b433; color: #87ceeb; }
  .tier-Low { background: #2e8b5733; color: #66cdaa; }
  .tier-None { background: #55555533; color: #999; }
  .tier-TRASH { background: #8b000033; color: #cd5c5c; }
  .notes { color: var(--muted); font-size: 0.82rem; }
  mark { background: var(--accent); color: #fff; border-radius: 2px; padding: 0 2px; }
  .footer {
    text-align: center;
    padding: 1.5rem;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }
  .footer a { color: var(--accent); text-decoration: none; }
  @media (max-width: 700px) {
    .header h1 { font-size: 1.6rem; }
    .controls { flex-direction: column; }
    #search, #tierFilter { width: 100%; font-size: 16px; }
    .count { margin-left: 0; }
    table, thead, tbody, tr, th, td { display: block; }
    thead { display: none; }
    tbody tr {
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    td { padding: 0.2rem 0; border: none; }
    td:nth-child(1) { font-size: 1rem; margin-bottom: 0.25rem; }
    td:nth-child(2)::before { content: "Category: "; color: var(--muted); font-size: 0.75rem; }
    td:nth-child(2) { font-size: 0.82rem; margin-bottom: 0.25rem; }
    td:nth-child(3) { margin-bottom: 0.25rem; }
    td:nth-child(4) { font-size: 0.82rem; }
    .table-wrap { padding: 0 0.5rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Items to Keep in D2R</h1>
  <p>Nokk's "Trash It Or Stash It" — What to Keep in Diablo II: Resurrected</p>
  <p style="margin-top:0.3rem"><a href="https://www.reddit.com/r/Diablo_2_Resurrected/wiki/items-to-keep-in-d2r/" target="_blank">Original guide by Nokk on Reddit</a></p>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search items, notes, category..." autofocus>
  <select id="tierFilter">
    <option value="">All Tiers</option>
    <option value="High">High</option>
    <option value="Med">Med</option>
    <option value="Low">Low</option>
    <option value="None">None</option>
    <option value="TRASH">TRASH</option>
  </select>
  <span class="count" id="count"></span>
</div>

<div class="table-wrap">
  <table id="items">
    <thead>
      <tr>
        <th data-col="0">Item</th>
        <th data-col="1">Category</th>
        <th data-col="2">Tier</th>
        <th data-col="3">Notes</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="footer">
  Credit: <a href="https://maxroll.gg/d2/items/valuable-unique-set-items" target="_blank">Maxroll.gg Valuable Unique &amp; Set Items</a>
  &bull; <a href="https://www.reddit.com/r/Diablo_2_Resurrected/wiki/items-to-keep-in-d2r/" target="_blank">Nokk's Guide on r/Diablo_2_Resurrected</a>
</div>

<script>
let DATA=[];

fetch("data.csv").then(r=>r.text()).then(t=>{
  DATA=t.trim().split("\n").slice(1).map(line=>{
    const m=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){m.push(cur);cur="";}
      else{cur+=c;}
    }
    m.push(cur);
    return m;
  });
  render();
});



const TIER_LABELS={High:"High",Med:"Med",Low:"Low",None:"None",TRASH:"TRASH"};
const TIER_CLASS={High:"tier-High",Med:"tier-Med",Low:"tier-Low",None:"tier-None",TRASH:"tier-TRASH"};

const tbody=document.getElementById("tbody");
const searchEl=document.getElementById("search");
const tierEl=document.getElementById("tierFilter");
const countEl=document.getElementById("count");

let sortCol=0, sortAsc=true;

function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function highlight(text, q){
  if(!q) return escHtml(text);
  // try exact match first
  const re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
  const esc=escHtml(text);
  if(re.test(text)) return esc.replace(re,"<mark>$1</mark>");
  // fuzzy normalized highlight: walk through original text matching normalized query chars
  const qN=norm(q);
  if(!qN) return esc;
  const lower=text.toLowerCase();
  // find the start position in the original text
  let qi=0, start=-1, end=-1;
  for(let i=0;i<lower.length;i++){
    const ch=lower[i];
    if(norm(ch)==="") continue; // skip special chars
    if(ch===qN[qi]||(norm(ch)===qN[qi])){
      if(qi===0) start=i;
      qi++;
      if(qi===qN.length){ end=i+1; break; }
    } else if(start>=0){
      // restart: backtrack
      i=start; qi=0; start=-1;
    }
  }
  if(start>=0 && end>0){
    return escHtml(text.slice(0,start))+"<mark>"+escHtml(text.slice(start,end))+"</mark>"+escHtml(text.slice(end));
  }
  return esc;
}

function norm(s){return s.toLowerCase().replace(/[^a-z0-9\u0E00-\u0E7F]/g,"");}

function render(){
  const q=searchEl.value.trim().toLowerCase();
  const qNorm=norm(q);
  const tier=tierEl.value;
  let filtered=DATA.filter(r=>{
    if(tier && r[2]!==tier) return false;
    if(q){
      const hay=(r[0]+" "+r[1]+" "+TIER_LABELS[r[2]]+" "+r[3]).toLowerCase();
      if(hay.includes(q)) return true;
      const hayNorm=norm(hay);
      return hayNorm.includes(qNorm);
    }
    return true;
  });
  filtered.sort((a,b)=>{
    let va=a[sortCol], vb=b[sortCol];
    if(sortCol===2){va=TIER_LABELS[va];vb=TIER_LABELS[vb];}
    const cmp=va.localeCompare(vb);
    return sortAsc?cmp:-cmp;
  });
  const rows=filtered.map(r=>{
    const tierLabel=TIER_LABELS[r[2]];
    const tierCls=TIER_CLASS[r[2]];
    return `<tr>
      <td>${highlight(r[0],searchEl.value.trim())}</td>
      <td>${highlight(r[1],searchEl.value.trim())}</td>
      <td><span class="tier ${tierCls}">${escHtml(tierLabel)}</span></td>
      <td class="notes">${highlight(r[3],searchEl.value.trim())}</td>
    </tr>`;
  }).join("");
  tbody.innerHTML=rows;
  countEl.textContent=filtered.length+" / "+DATA.length+" items";
}

searchEl.addEventListener("input",render);
tierEl.addEventListener("change",render);

document.querySelectorAll("thead th").forEach(th=>{
  th.addEventListener("click",()=>{
    const col=+th.dataset.col;
    if(sortCol===col) sortAsc=!sortAsc;
    else { sortCol=col; sortAsc=true; }
    render();
  });
});

render();
</script>
</body>
</html>
